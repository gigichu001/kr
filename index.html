<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한글 학습 카드 · 시험 대비 카드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Serif+TC:wght@400;600;700&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #efe4cf;
  --bg-deep: #e4d5b7;
  --paper: #fbf4e4;
  --paper-2: #f6ecd8;
  --ink: #3b2a1d;
  --ink-soft: #6b5643;
  --ink-faint: #93816c;
  --brown: #8a5a34;
  --brown-deep: #5f3c1f;
  --brown-line: #c9ad82;
  --gold: #a97a3f;
  --good: #4c6b3f;
  --good-bg: #e4ead9;
  --bad: #a13d2f;
  --bad-bg: #f3ded9;
  --shadow: 0 2px 0 rgba(90,60,30,0.15);
  --radius: 14px;
  font-size: 16px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background: var(--bg);
  background-image:
    radial-gradient(circle at 20% 10%, rgba(255,255,255,0.25), transparent 40%),
    repeating-linear-gradient(90deg, rgba(90,60,30,0.02) 0px, rgba(90,60,30,0.02) 1px, transparent 1px, transparent 80px);
  color: var(--ink);
  font-family: 'Nanum Gothic', 'Noto Serif KR', sans-serif;
  min-height: 100vh;
  line-height: 1.5;
}
.wrap{
  max-width: 720px;
  margin: 0 auto;
  padding: 28px 20px 60px;
}
.brand{
  display:flex; align-items:baseline; justify-content:space-between; gap:12px;
  margin-bottom: 22px; padding-bottom: 14px;
  border-bottom: 2px solid var(--brown-line);
}
.brand h1{
  font-family:'Noto Serif KR', serif; font-weight:700; font-size:26px; margin:0; color:var(--brown-deep);
  letter-spacing: -0.01em;
}
.brand .sub{ font-size:13px; color:var(--ink-faint); }
.home-grid{
  display:grid; grid-template-columns: 1fr 1fr; gap:14px;
}
@media (max-width:520px){ .home-grid{ grid-template-columns: 1fr; } }
.block{
  background: var(--paper);
  border: 1px solid var(--brown-line);
  border-radius: var(--radius);
  padding: 18px 18px 16px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform .12s ease, box-shadow .12s ease;
  position: relative;
  overflow:hidden;
}
.block:hover{ transform: translateY(-2px); box-shadow: 0 6px 0 rgba(90,60,30,0.12); }
.block::before{
  content:''; position:absolute; left:0; top:0; bottom:0; width:6px; background: var(--brown);
}
.block .tag{
  font-size:11px; letter-spacing:.08em; color:var(--gold); font-weight:700; text-transform:uppercase;
}
.block h2{
  font-family:'Noto Serif KR', serif; font-size:19px; margin:4px 0 6px; color:var(--brown-deep); font-weight:700;
}
.block p{ font-size:13px; color:var(--ink-soft); margin:0 0 10px; }
.block .stat{
  font-size:12px; color:var(--ink-faint); font-variant-numeric: tabular-nums;
  border-top: 1px dashed var(--brown-line); padding-top:8px; margin-top:4px;
}
.block.custom{ background: var(--paper-2); }

.sublevel-panel{
  grid-column: 1/-1;
  background: var(--paper-2);
  border: 1px dashed var(--brown-line);
  border-radius: var(--radius);
  padding: 14px 16px;
  display:none;
}
.sublevel-panel.open{ display:block; }
.sublevel-panel .row{ display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
.chip{
  background: var(--paper);
  border:1px solid var(--brown-line);
  border-radius: 999px;
  padding: 7px 14px;
  font-size:13px;
  cursor:pointer;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.chip:hover{ background: var(--bg-deep); }
.chip.full{ background: var(--brown); color:#fff8ec; border-color:var(--brown-deep); font-weight:700; }
.mode-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:10px;
}
.mode-chip{
  border-radius:10px;
  text-align:center;
}
.mode-chip.active{
  background: var(--gold);
  border-color: var(--brown-deep);
  color:#fff8ec;
}
.sublevel-panel .close{
  float:right; font-size:12px; color:var(--ink-faint); cursor:pointer; text-decoration:underline;
}

/* ---- custom deck form ---- */
.custom-form{ display:none; }
.custom-form.open{ display:block; }
.custom-form input, .custom-form textarea{
  width:100%; font-family: inherit; font-size:15px; padding:10px 12px;
  border:1px solid var(--brown-line); border-radius:10px; background:var(--paper);
  color:var(--ink); margin-bottom:8px;
}
.custom-form .two-col{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.custom-list{ margin-top:10px; max-height:220px; overflow-y:auto; }
.custom-item{
  display:flex; justify-content:space-between; align-items:center; gap:8px;
  padding:6px 10px; border-bottom:1px solid var(--brown-line); font-size:14px;
}
.custom-item .del{ color:var(--bad); cursor:pointer; font-size:12px; }

/* ---- buttons ---- */
button{
  font-family:inherit; font-size:14px; cursor:pointer;
  border-radius:10px; border:1px solid var(--brown-line); background:var(--paper);
  padding:11px 14px; color:var(--ink); font-weight:700;
}
button:active{ transform: translateY(1px); }
button.primary{ background:var(--brown); color:#fff8ec; border-color:var(--brown-deep); }
button.ghost{ background:transparent; }
.backbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.backbar .back{ font-size:13px; color:var(--brown-deep); cursor:pointer; text-decoration:underline; }
.deck-title{ font-family:'Noto Serif KR',serif; font-size:18px; color:var(--brown-deep); font-weight:700; }

/* ---- stat bar ---- */
.statbar{
  display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:16px;
}
.statcell{
  background: var(--paper); border:1px solid var(--brown-line); border-radius:10px;
  text-align:center; padding:8px 4px;
}
.statcell .l{ font-size:10px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.05em; }
.statcell .v{ font-size:17px; font-weight:700; color:var(--brown-deep); font-variant-numeric:tabular-nums; }

/* ---- card ---- */
.card{
  background: var(--paper);
  border: 1px solid var(--brown-line);
  border-radius: 18px;
  min-height: 260px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding: 30px 20px;
  cursor:pointer; user-select:none;
  box-shadow: 0 3px 0 rgba(90,60,30,0.18), inset 0 0 0 1px rgba(255,255,255,0.5);
  margin-bottom: 16px;
  text-align:center;
}
.card .front{
  font-family:'Noto Serif KR','Noto Serif TC',serif;
  font-weight:700;
  font-size: 58px;
  color: var(--ink);
  line-height:1.15;
  word-break: keep-all;
}
.card.small .front{ font-size:38px; }
.card .back{
  margin-top:16px;
  font-family:'Noto Serif TC','Noto Serif KR',serif;
  font-size:19px;
  color: var(--brown-deep);
  visibility:hidden;
  border-top: 1px dashed var(--brown-line);
  padding-top:14px;
  width:100%;
}
.card .hint{ margin-top:14px; font-size:12px; color:var(--ink-faint); }
.speak-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin-top:12px;
}
.speak-btn{
  display:inline-flex; align-items:center; justify-content:center;
  width:38px; height:38px; border-radius:50%;
  background: var(--paper-2); border:1px solid var(--brown-line); color:var(--brown-deep);
  font-size:17px; cursor:pointer; padding:0;
}
.speak-btn:active{ transform: translateY(1px); }
.speak-btn.hidden{ display:none !important; }

.gradebar{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
.gradebar .no{ border-color:var(--bad); color:var(--bad); }
.gradebar .yes{ border-color:var(--good); color:var(--good); }
.toolbar{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }

/* ---- results ---- */
.results{ text-align:center; }
.results .score{ font-size:44px; font-weight:700; color:var(--brown-deep); font-family:'Noto Serif KR',serif; }
.results .acc{ font-size:14px; color:var(--ink-soft); margin-bottom:20px; }
.wronglist{ text-align:left; background:var(--paper); border:1px solid var(--brown-line); border-radius:12px; padding:6px 14px; margin-bottom:18px; max-height:280px; overflow-y:auto; }
.wronglist .item{ display:flex; justify-content:space-between; gap:10px; padding:8px 0; border-bottom:1px dashed var(--brown-line); font-size:14px; }
.wronglist .item:last-child{ border-bottom:none; }
.wronglist .q{ font-family:'Noto Serif KR',serif; font-weight:700; }
.wronglist .a{ color:var(--ink-soft); }
.results .actions{ display:grid; gap:10px; }
.hidden{ display:none !important; }
.empty-note{ font-size:13px; color:var(--ink-faint); text-align:center; padding:20px 0; }
</style>
</head>
<body>
<div class="wrap">

  <div class="brand">
    <h1>한글 학습 카드</h1>
    <div class="sub">시험 대비 학습 카드</div>
  </div>

  <!-- HOME VIEW -->
  <div id="view-home">
    <div class="home-grid" id="home-grid"></div>
  </div>

  <!-- CUSTOM DECK BUILDER VIEW -->
  <div id="view-custom" class="hidden">
    <div class="backbar">
      <span class="back" onclick="goHome()">← 홈으로</span>
      <span class="deck-title">직접 만들기</span>
      <span></span>
    </div>
    <div class="block" style="cursor:default;">
      <p style="margin-bottom:10px;">한국어 단어와 뜻을 입력하세요 (중문/영문/숫자 가능)</p>
      <div class="two-col">
        <input id="custom-q" type="text" placeholder="한국어 단어 (예: 사랑)">
        <input id="custom-a" type="text" placeholder="뜻 (예: 愛 / love / 1)">
      </div>
      <button class="primary" onclick="addCustomCard()" style="width:100%;">+ 카드 추가</button>
      <div class="custom-list" id="custom-list"></div>
    </div>
    <div style="margin-top:14px;">
      <div class="mode-row">
        <span class="chip full mode-chip" id="custom-dictation-mode" onclick="selectCustomMode('dictation')">받아쓰기</span>
        <span class="chip full mode-chip active" id="custom-flashcard-mode" onclick="selectCustomMode('flashcard')">카드 학습</span>
      </div>
      <button class="primary" style="width:100%;" onclick="startCustomReview()">이 카드로 복습 시작 →</button>
    </div>
  </div>

  <!-- REVIEW VIEW -->
  <div id="view-review" class="hidden">
    <div class="backbar">
      <span class="back" onclick="goHome()">← 홈으로</span>
      <span class="deck-title" id="review-title"></span>
      <span></span>
    </div>
    <div class="statbar">
      <div class="statcell"><div class="l">카드</div><div class="v" id="stat-pos">-</div></div>
      <div class="statcell"><div class="l">복습</div><div class="v" id="stat-rev">0</div></div>
      <div class="statcell"><div class="l">정답</div><div class="v" id="stat-cor">0</div></div>
      <div class="statcell"><div class="l">정확도</div><div class="v" id="stat-acc">0%</div></div>
    </div>
    <div class="card" id="card" onclick="flipCard()">
      <div class="front" id="card-front">-</div>
      <div class="speak-row">
        <button class="speak-btn" id="speak-btn" onclick="speakCurrentWord(event)" aria-label="발음 듣기" title="발음 듣기">🔊</button>
        <button class="speak-btn hidden" id="speak-parts-btn" onclick="speakCurrentWordParts(event)" aria-label="자모 나누어 듣기" title="자모 나누어 듣기">ㄱ</button>
      </div>
      <div class="back" id="card-back">-</div>
      <div class="hint" id="card-hint">눌러서 정답 보기</div>
    </div>
    <div class="gradebar">
      <button class="no" onclick="gradeCard(false)">✕ 몰라요</button>
      <button class="yes" onclick="gradeCard(true)">✓ 알아요</button>
    </div>
    <div class="toolbar">
      <button onclick="shuffleDeck()">⟲ 섞기</button>
      <button onclick="resetStats()">↺ 기록 초기화</button>
    </div>
  </div>

  <!-- RESULTS VIEW -->
  <div id="view-results" class="hidden">
    <div class="backbar">
      <span class="back" onclick="goHome()">← 홈으로</span>
      <span class="deck-title">결과</span>
      <span></span>
    </div>
    <div class="results">
      <div class="score" id="res-score">0/0</div>
      <div class="acc" id="res-acc">정확도 0%</div>
      <div id="res-wrong-wrap">
        <div class="wronglist" id="res-wronglist"></div>
      </div>
      <div class="actions">
        <button class="primary" id="res-retry-btn" onclick="retryWrongOnly()">틀린 것만 다시</button>
        <button onclick="restartFullDeck()">처음부터 다시</button>
        <button class="ghost" onclick="goHome()">홈으로</button>
      </div>
    </div>
  </div>

</div>

}

  try{ return JSON.parse(localStorage.getItem('hangul_custom_v1')) || []; }catch(e){ return []; }
}
function saveCustom(list){ try{ localStorage.setItem('hangul_custom_v1', JSON.stringify(list)); }catch(e){} }

/* ---------- pronunciation (TTS) ---------- */
var ttsSupported = ('speechSynthesis' in window);
var koVoice = null;
function pickKoVoice(){
  if(!ttsSupported) return;
  var voices = window.speechSynthesis.getVoices();
  koVoice = voices.filter(function(v){ return v.lang === 'ko-KR'; })[0] ||
            voices.filter(function(v){ return v.lang && v.lang.indexOf('ko') === 0; })[0] || null;
}
if(ttsSupported){
  pickKoVoice();
  window.speechSynthesis.onvoiceschanged = pickKoVoice;
}
function speakText(text){
  if(!ttsSupported || !text) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.lang = 'ko-KR';
  if(koVoice) u.voice = koVoice;
  u.rate = 0.9;
  window.speechSynthesis.speak(u);
}
function speakCurrentWord(ev){
  if(ev) ev.stopPropagation();
  if(deck.length === 0) return;
  speakText(deck[pos].q);
}
function hangulPhonicsStepsForWord(word){
  var initialSound = ['그','끄','느','드','뜨','르','므','브','쁘','스','쓰','','즈','쯔','츠','크','트','프','흐'];
  var medialSound = ['아','애','야','얘','어','에','여','예','오','와','왜','외','요','우','워','웨','위','유','으','의','이'];
  var finalSound = ['', '윽','윽','윽','은','은','은','읃','을','윽','음','읍','을','을','읍','을','음','읍','읍','읃','읃','응','읃','읃','윽','읃','읍','읃'];
  var steps = [];
  for(var i=0;i<word.length;i++){
    var code = word.charCodeAt(i);
    if(code < 0xAC00 || code > 0xD7A3) continue;
    var n = code - 0xAC00;
    var cho = Math.floor(n / 588);
    var jung = Math.floor((n % 588) / 28);
    var jong = n % 28;
    var fullSyllable = word.charAt(i);
    if(initialSound[cho]) steps.push({text: initialSound[cho], after: 350, rate: 0.72});
    steps.push({text: medialSound[jung], after: 350, rate: 0.72});
    if(finalSound[jong]) steps.push({text: finalSound[jong], after: 350, rate: 0.72});
    steps.push({text: fullSyllable, after: 1000, rate: 0.82});
  }
  return steps;
}
function speakKoSequence(items, index){
  if(index >= items.length) return;
  var item = items[index];
  if(item.pause){
    setTimeout(function(){ speakKoSequence(items, index + 1); }, item.pause);
    return;
  }
  var u = new SpeechSynthesisUtterance(item.text);
  u.lang = 'ko-KR';
  if(koVoice) u.voice = koVoice;
  u.rate = item.rate || 0.78;
  u.onend = function(){
    setTimeout(function(){ speakKoSequence(items, index + 1); }, item.after || 250);
  };
  u.onerror = function(){
    setTimeout(function(){ speakKoSequence(items, index + 1); }, item.after || 250);
  };
  window.speechSynthesis.speak(u);
}
function speakKoQueue(items){
  window.speechSynthesis.cancel();
  speakKoSequence(items, 0);
}
function speakCurrentWordParts(ev){
  if(ev) ev.stopPropagation();
  if(!ttsSupported || deck.length === 0) return;
  var words = deck[pos].q.split(/\s+/).filter(function(w){ return /[가-힣]/.test(w); });
  var queue = [];
  words.forEach(function(word, wordIndex){
    var steps = hangulPhonicsStepsForWord(word);
    queue = queue.concat(steps);
    if(wordIndex < words.length - 1) queue.push({pause: 1000});
  });
  if(!queue.length) return;
  speakKoQueue(queue);
}

/* ---------- utils ---------- */
function shuffle(arr){
  var a = arr.slice();
  for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; }
  return a;
}
function chunkArray(arr, size){
  var out = [];
  for(var i=0;i<arr.length;i+=size) out.push(arr.slice(i, i+size));
  return out;
}
function pct(correct, total){ return total ? Math.round(correct/total*100) : 0; }

/* ---------- level config ---------- */
var LV5_DATA = LV3_DATA.concat(LV4_DATA);
var LEVELS = [
  {id:'lv1', tag:'1단계', title:'기본 자모', desc:'자음 19 + 모음 10 · 29장', data:LV1_DATA, sub:false},
  {id:'lv2', tag:'2단계', title:'전체 음절표', desc:'자음 × 모음 · 190장', data:LV2_DATA, sub:true},
  {id:'lv3', tag:'3단계', title:'상용 어휘', desc:'자주 쓰는 어휘 · 70장', data:LV3_DATA, sub:true},
  {id:'lv4', tag:'4단계', title:'토픽 단어장', desc:'단어 목록 1-22 · 866장', data:LV4_DATA, sub:true},
  {id:'lv5', tag:'5단계', title:'혼합 (3+4단계)', desc:'혼합 어휘 · ' + LV5_DATA.length + '장', data:LV5_DATA, sub:true}
];

/* ---------- review state ---------- */
var deck = [], pos = 0, revealed = false;
var reviewMode = 'flashcard';
var pendingMode = 'flashcard';
var customMode = 'flashcard';
var sessionReviewed = 0, sessionCorrect = 0;
var wrongMap = {};
var deckLabel = '', topLevelId = '';
var originalDeckForRestart = [];
var customData = loadCustom();

/* ---------- view switching ---------- */
function showView(name){
  ['home','custom','review','results'].forEach(function(v){
    document.getElementById('view-'+v).classList.toggle('hidden', v !== name);
  });
}
function goHome(){ renderHome(); showView('home'); }

/* ---------- home rendering ---------- */
function renderHome(){
  var stats = loadStats();
  var html = '';
  LEVELS.forEach(function(lv){
    var st = stats[lv.id];
    var statLine = st && st.reviewed ? ('누적 정확도 ' + pct(st.correct, st.reviewed) + '% · ' + st.reviewed + '회 학습') : '아직 학습 기록 없음';
    html += '<div class="block" onclick="onLevelClick(\'' + lv.id + '\')">' +
      '<div class="tag">' + lv.tag + '</div>' +
      '<h2>' + lv.title + '</h2>' +
      '<p>' + lv.desc + '</p>' +
      '<div class="stat">' + statLine + '</div>' +
    '</div>';
    if(!lv.sub){
      html += '<div class="sublevel-panel" id="panel-' + lv.id + '">' +
        '<span class="close" onclick="closeSublevel(\'' + lv.id + '\', event)">닫기 ✕</span>' +
        '<strong>' + lv.title + ' — 모드 선택</strong>' +
        '<div class="row" id="chips-' + lv.id + '"></div>' +
      '</div>';
    }
    if(lv.sub){
      html += '<div class="sublevel-panel" id="panel-' + lv.id + '">' +
        '<span class="close" onclick="closeSublevel(\'' + lv.id + '\', event)">닫기 ✕</span>' +
        '<strong>' + lv.title + ' — 세부 선택</strong>' +
        '<div class="row" id="chips-' + lv.id + '"></div>' +
      '</div>';
    }
  });
  var cst = stats['custom'];
  var customStatLine = cst && cst.reviewed ? ('누적 정확도 ' + pct(cst.correct, cst.reviewed) + '% · ' + cst.reviewed + '회 학습') : (customData.length + '장 저장됨');
  html += '<div class="block custom" onclick="openCustomBuilder()">' +
    '<div class="tag">내 카드</div>' +
    '<h2>직접 만들기</h2>' +
    '<p>나만의 단어 카드 추가</p>' +
    '<div class="stat">' + customStatLine + '</div>' +
  '</div>';
  document.getElementById('home-grid').innerHTML = html;
}

function onLevelClick(id){
  var lv = LEVELS.filter(function(l){ return l.id===id; })[0];
  var panel = document.getElementById('panel-' + id);
  var wasOpen = panel.classList.contains('open');
  document.querySelectorAll('.sublevel-panel').forEach(function(p){ p.classList.remove('open'); });
  if(!wasOpen){
    panel.classList.add('open');
    document.getElementById('chips-' + id).innerHTML =
      '<div class="mode-row">' +
        '<span class="chip full mode-chip" onclick="selectReviewMode(\'' + id + '\', \'dictation\', event)">받아쓰기</span>' +
        '<span class="chip full mode-chip" onclick="selectReviewMode(\'' + id + '\', \'flashcard\', event)">카드 학습</span>' +
      '</div>';
  }
}
function closeSublevel(id, ev){ ev.stopPropagation(); document.getElementById('panel-'+id).classList.remove('open'); }

function selectReviewMode(id, mode, ev){
  ev.stopPropagation();
  pendingMode = mode;
  var lv = LEVELS.filter(function(l){ return l.id===id; })[0];
  var dictClass = mode === 'dictation' ? 'chip full mode-chip active' : 'chip full mode-chip';
  var flashClass = mode === 'flashcard' ? 'chip full mode-chip active' : 'chip full mode-chip';
  var modeHtml =
    '<div class="mode-row">' +
      '<span class="' + dictClass + '" onclick="selectReviewMode(\'' + id + '\', \'dictation\', event)">받아쓰기</span>' +
      '<span class="' + flashClass + '" onclick="selectReviewMode(\'' + id + '\', \'flashcard\', event)">카드 학습</span>' +
    '</div>';
  if(!lv.sub){
    document.getElementById('chips-' + id).innerHTML =
      modeHtml +
      '<span class="chip full" onclick="startWholeLevel(\'' + id + '\', event)">시작 (' + lv.data.length + '장)</span>';
    return;
  }
  var chunks = chunkArray(lv.data, 20);
  var chipsHtml =
    modeHtml +
    '<span class="chip full" onclick="startFromChunk(\'' + id + '\', -1, event)">전체 (' + lv.data.length + '장)</span>';
  chunks.forEach(function(c, i){
    chipsHtml += '<span class="chip" onclick="startFromChunk(\'' + id + '\', ' + i + ', event)">' + (i+1) + ' (' + c.length + ')</span>';
  });
  document.getElementById('chips-' + id).innerHTML = chipsHtml;
}

function startWholeLevel(levelId, ev){
  ev.stopPropagation();
  var lv = LEVELS.filter(function(l){ return l.id===levelId; })[0];
  startReview(lv.id, lv.data, lv.title, pendingMode);
  showView('review');
}

function startFromChunk(levelId, chunkIndex, ev){
  ev.stopPropagation();
  var lv = LEVELS.filter(function(l){ return l.id===levelId; })[0];
  if(chunkIndex === -1){
    startReview(lv.id, lv.data, lv.title + ' · 전체', pendingMode);
  }else{
    var chunks = chunkArray(lv.data, 20);
    startReview(lv.id, chunks[chunkIndex], lv.title + ' · ' + (chunkIndex+1), pendingMode);
  }
  showView('review');
}

/* ---------- custom deck builder ---------- */
function openCustomBuilder(){ renderCustomList(); showView('custom'); }
function selectCustomMode(mode){
  customMode = mode;
  document.getElementById('custom-dictation-mode').classList.toggle('active', mode === 'dictation');
  document.getElementById('custom-flashcard-mode').classList.toggle('active', mode === 'flashcard');
}
function renderCustomList(){
  var html = '';
  if(customData.length === 0){
    html = '<div class="empty-note">아직 추가된 카드가 없습니다.</div>';
  }else{
    customData.forEach(function(c, i){
      html += '<div class="custom-item"><span><strong>' + escapeHtml(c.q) + '</strong> — ' + escapeHtml(c.a) + '</span><span class="del" onclick="deleteCustomCard(' + i + ')">삭제</span></div>';
    });
  }
  document.getElementById('custom-list').innerHTML = html;
}
function escapeHtml(s){ var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function addCustomCard(){
  var q = document.getElementById('custom-q').value.trim();
  var a = document.getElementById('custom-a').value.trim();
  if(!q || !a) return;
  customData.push({q:q, a:a});
  saveCustom(customData);
  document.getElementById('custom-q').value = '';
  document.getElementById('custom-a').value = '';
  renderCustomList();
}
function deleteCustomCard(i){
  customData.splice(i,1);
  saveCustom(customData);
  renderCustomList();
}
function startCustomReview(){
  if(customData.length === 0){ alert('먼저 카드를 추가하세요.'); return; }
  startReview('custom', customData, '직접 만들기', customMode);
  showView('review');
}

/* ---------- review engine ---------- */
function startReview(levelId, data, label, mode){
  reviewMode = mode || 'flashcard';
  topLevelId = levelId;
  deckLabel = label;
  originalDeckForRestart = data.slice();
  deck = shuffle(data);
  pos = 0;
  sessionReviewed = 0;
  sessionCorrect = 0;
  wrongMap = {};
  document.getElementById('review-title').textContent = label;
  renderCard();
  renderStats();
}
function renderCard(){
  if(deck.length === 0){ return; }
  var c = deck[pos];
  var cardEl = document.getElementById('card');
  cardEl.classList.toggle('small', c.q.length > 3);
  if(reviewMode === 'dictation'){
    document.getElementById('card-front').textContent = '';
    document.getElementById('card-back').textContent = c.q + ' — ' + c.a;
    document.getElementById('card-hint').textContent = '듣고 종이에 써 보세요';
  }else{
    document.getElementById('card-front').textContent = c.q;
    document.getElementById('card-back').textContent = c.a;
    document.getElementById('card-hint').textContent = '눌러서 정답 보기';
  }
  document.getElementById('card-back').style.visibility = 'hidden';
  document.getElementById('card-hint').style.visibility = 'visible';
  document.getElementById('speak-btn').classList.toggle('hidden', !ttsSupported);
  document.getElementById('speak-parts-btn').classList.toggle('hidden', !ttsSupported || topLevelId !== 'lv5');
  revealed = false;
  document.getElementById('stat-pos').textContent = (pos+1) + '/' + deck.length;
}
function renderStats(){
  document.getElementById('stat-rev').textContent = sessionReviewed;
  document.getElementById('stat-cor').textContent = sessionCorrect;
  document.getElementById('stat-acc').textContent = pct(sessionCorrect, sessionReviewed) + '%';
}
function flipCard(){
  if(revealed) return;
  revealed = true;
  if(reviewMode === 'dictation'){
    document.getElementById('card-front').textContent = deck[pos].q;
  }
  document.getElementById('card-back').style.visibility = 'visible';
  document.getElementById('card-hint').style.visibility = 'hidden';
}
function gradeCard(isCorrect){
  if(deck.length === 0) return;
  if(!revealed) flipCard();
  var c = deck[pos];
  sessionReviewed++;
  if(isCorrect){ sessionCorrect++; } else { wrongMap[c.q] = c; }
  bumpStat(topLevelId, isCorrect);
  renderStats();
  pos++;
  if(pos >= deck.length){ showResults(); } else { renderCard(); }
}
function shuffleDeck(){
  deck = shuffle(deck);
  pos = 0;
  renderCard();
}
function resetStats(){
  sessionReviewed = 0; sessionCorrect = 0; wrongMap = {};
  renderStats();
}

/* ---------- results ---------- */
function showResults(){
  showView('results');
  document.getElementById('res-score').textContent = sessionCorrect + '/' + sessionReviewed;
  document.getElementById('res-acc').textContent = '정확도 ' + pct(sessionCorrect, sessionReviewed) + '%';
  var wrongList = Object.keys(wrongMap).map(function(k){ return wrongMap[k]; });
  var wrap = document.getElementById('res-wronglist');
  var retryBtn = document.getElementById('res-retry-btn');
  if(wrongList.length === 0){
    wrap.innerHTML = '<div class="empty-note">모두 맞췄습니다! 🎉</div>';
    retryBtn.classList.add('hidden');
  }else{
    retryBtn.classList.remove('hidden');
    retryBtn.textContent = '틀린 것만 다시 (' + wrongList.length + '장)';
    var html = '';
    wrongList.forEach(function(c){
      html += '<div class="item"><span class="q">' + escapeHtml(c.q) + '</span><span class="a">' + escapeHtml(c.a) + '</span></div>';
    });
    wrap.innerHTML = html;
  }
}
function retryWrongOnly(){
  var wrongList = Object.keys(wrongMap).map(function(k){ return wrongMap[k]; });
  if(wrongList.length === 0) return;
  deck = shuffle(wrongList);
  pos = 0; sessionReviewed = 0; sessionCorrect = 0; wrongMap = {};
  showView('review');
  renderCard();
  renderStats();
}
function restartFullDeck(){
  deck = shuffle(originalDeckForRestart);
  pos = 0; sessionReviewed = 0; sessionCorrect = 0; wrongMap = {};
  showView('review');
  renderCard();
  renderStats();
}

/* ---------- init ---------- */
renderHome();
showView('home');

</script>
